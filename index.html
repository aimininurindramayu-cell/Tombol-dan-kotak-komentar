<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .running-text {
            color: yellow;
            animation: run 5s linear infinite;
        }
        @keyframes run {
            from { transform: translateX(100%); }
            to { transform: translateX(-100%); }
        }
    </style>
</head>
<body>
    <div class="running-text">Adzan</div>
    <div class="running-text">Istirahat</div>
</body>
</html>
