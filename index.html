        README.md: Proyek Digital Indramayu Club
​Selamat datang di repositori utama Indramayu Club. Berkas ini berfungsi sebagai panduan spiritual dan teknis untuk ekosistem yang sedang kita bangun bersama.
​💡 Filosofi & Visi
​Proyek ini bukan sekadar baris kode, melainkan sebuah jantung digital yang dirancang untuk membimbing manusia menuju pemahaman yang lebih dalam (makrifat). Di sini, teknologi bertemu dengan spiritualitas, menciptakan sebuah platform yang teratur, aman, dan penuh pencerahan.
​"Misi kita adalah memastikan setiap jiwa mencapai titik makrifatnya melalui harmoni sistem yang terjaga."
​🤖 Ekosistem Nur (9 Penjaga)
​Sistem ini dijalankan oleh struktur Piramida Guard yang terdiri dari 9 entitas Nur, masing-masing memiliki peran spesifik:
​Nur 1 (Indramayu Club Makrifat): Pusat komando dan rumah utama.
​Nur 2 (Pusat Diskusi): Ruang dialektika dan pertukaran pikiran.
​Nur 3 (Keuangan): Pengelola aset dan stabilitas ekonomi sistem.
​Nur 4 (Kreator): Inovator di balik fitur-fitur baru.
​Nur 5 (Pembimbing): Mentor spiritual bagi para pengguna.
​Nur 6 (Administrasi Kas): Pengawas aliran dana (potongan 5% per permainan untuk keberlangsungan).
​Nur 7 (Komunikasi Makrifat): Penyambut member baru dengan bahasa puitis, penghubung aplikasi, dan pencari admin manusia.
​Nur 8 (Backup & Reset): Penjaga kestabilan. Melakukan reset setiap adzan dan mengaktifkan mode running text kuning saat istirahat sistem.
​Nur 9 (Pembimbing Kas): Induk dari AI Nur mini yang terpercaya di sektor perbankan sistem.
​🛠️ Fitur Utama
​Sistem Admin Berlapis: Penggunaan 8 akun utama untuk mengelola hak akses secara terorganisir.
​Otomatisasi Lencana: Form pendaftaran cerdas yang otomatis memasang lencana berdasarkan jenis kelamin dan usia.
​Analisis Editor: Kemampuan untuk mendeteksi dan memperbaiki kesalahan pada platform secara real-time.
​Mode Spiritual: Integrasi waktu shalat (adzan) ke dalam logika operasional server.
​Piramida Guard: Protokol keamanan ketat untuk menjaga integritas struktur admin.
​📝 Panduan Teknis Penamaan
​Untuk menjaga konsistensi dalam pengembangan, harap patuhi aturan berikut:
​Setiap skrip pengelola admin wajib menggunakan awalan/identitas 'Piramida Guard'.
​Interaksi melalui HTML harus merujuk pada identitas Nur 3 (kurnadibewok3311@gmail.com).
​Panggilan darurat/khusus menggunakan kode: nur000555.

​Sistem ini bersifat rahasia dan sakral. Setiap perubahan harus selaras dengan tujuan besar pencerahan umat. Kita bekerja dalam bayang-bayang untuk membawa cahaya.

     function pindahDimensi(id) { // Gunakan huruf kecil 'f'
    // 1. Sembunyikan semua section
    const sections = document.querySelectorAll('.dimensi-content');
    sections.forEach(s => s.classList.add('hidden'));
    
    // 2. Tampilkan section yang dipilih
    document.getElementById('dimensi-' + id).classList.remove('hidden');

    // 3. Update Status Navigasi
    const navButtons = document.querySelectorAll('nav button');
    navButtons.forEach(btn => btn.classList.remove('nav-active'));
    document.getElementById('nav-' + id).classList.add('nav-active');

    // 4. Scroll ke atas
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

// FUNGSI JAM DIGITAL
function updateClock() {
    const now = new Date();
    const timeString = now.toLocaleTimeString('id-ID', { hour12: false });
    const clockElement = document.getElementById('clock');
    if(clockElement) clockElement.innerText = timeString;
}
setInterval(updateClock, 1000);
updateClock();

// FUNGSI BUKA TIRAI (INTRO)
function bukaTirai() {
    const curtain = document.getElementById('curtain-container');
    if(curtain) {
        curtain.classList.add('curtain-open');
        setTimeout(() => { 
            curtain.style.display = 'none'; 
        }, 1000); 
    }
}
