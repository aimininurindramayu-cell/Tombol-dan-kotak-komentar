        /* Foto AI sebagai Tameng (Overlay) */
        #ai-shield {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 50px auto;
            cursor: pointer;
            border-radius: 50%;
            border: 3px solid #ffd700;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            transition: transform 0.3s ease;
        }
        
        #ai-shield:hover { transform: scale(1.05); }

        #ai-shield img { width: 100%; height: 100%; object-fit: cover; }

        .hidden-info { display: none; } /* Menyembunyikan teks alamat secara absolut */

        #adzan-layer {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: rgba(0, 0, 0, 0.9);
            z-index: 9999;
        }
    </style>
</head>
